<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <script src="main.js"></script>
    <title>Mnist AI Project</title>
</head>
<body>
    <strong>
        <h1>
            Marvin's AI Lab,
        </h1>
    </strong>
    <hr>
    <br>
    <strong>
        <h3>
        Welcome to my Handwritten Digits Recognition project !
        </h3>
    </strong>
    
    <canvas id="canvas" width="700" height="700" style="border: 1px solid #000;">
        Write a digit and let the ai guess the result :)
    </canvas>

    <p id="prediction"></p>

    <button id="clear" onclick=clearCanvas()>
        Clear
    </button>
    <button id="guess" onclick=predictDigit()>
        Guess
    </button>

    <script>
        drawOnCanvas();
    </script>
    
</body>
</html>
